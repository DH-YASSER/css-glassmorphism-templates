<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glass Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }
    .form-container {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 90%; max-width: 400px;
      color: white;
    }
    h2 { margin-bottom: 2rem; font-size: 1.8rem; }
    label { font-size: 0.85rem; opacity: 0.7; display: block; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: white;
      font-size: 1rem; margin-bottom: 1.2rem;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    input:focus { outline: none; border-color: #38bdf8; }
    button {
      width: 100%; padding: 14px; border-radius: 10px;
      border: none; background: #38bdf8; color: #0f172a;
      font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Sign In</h2>
    <label>Email</label>
    <input type="email" placeholder="you@example.com" />
    <label>Password</label>
    <input type="password" placeholder="••••••••" />
    <button>Login</button>
  </div>
</body>
</html>
